<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Scramble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .game-section {
            margin-bottom: 30px;
        }

        .label {
            color: #555;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .scrambled {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 2.5em;
            letter-spacing: 10px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border: 1px solid #f5c6cb;
        }

        .stats {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            font-weight: 600;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty button {
            flex: 1;
            padding: 10px;
            background: #e0e0e0;
            color: #333;
            border: 2px solid transparent;
        }

        .difficulty button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .scrambled {
                font-size: 2em;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Number Scramble</h1>
        <p class="subtitle">Unscramble the numbers to win!</p>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Attempts:</span>
                <span class="stat-value" id="attempts">0</span>
            </div>
        </div>

        <div class="game-section">
            <label class="label">Difficulty:</label>
            <div class="difficulty">
                <button class="diff-btn active" data-difficulty="easy">Easy (2-3)</button>
                <button class="diff-btn" data-difficulty="medium">Medium (4-5)</button>
                <button class="diff-btn" data-difficulty="hard">Hard (6+)</button>
            </div>
        </div>

        <div class="game-section">
            <label class="label">Unscramble this:</label>
            <div class="scrambled" id="scrambledNumber">--</div>

            <div class="message" id="message"></div>

            <div class="input-section">
                <input type="number" id="answer" placeholder="Your answer" autocomplete="off">
                <button onclick="checkAnswer()">Submit</button>
            </div>

            <div class="button-group">
                <button onclick="newGame()" style="background: #28a745;">New Game</button>
                <button onclick="giveHint()" style="background: #ffc107; color: #333;">Hint</button>
            </div>
        </div>

        <div class="footer">
            Made with ❤️ • Guess the unscrambled number
        </div>
    </div>

    <script>
        let currentNumber = null;
        let currentScrambled = null;
        let score = 0;
        let attempts = 0;
        let difficulty = 'easy';

        const difficultyRanges = {
            easy: { min: 10, max: 99 },
            medium: { min: 1000, max: 99999 },
            hard: { min: 100000, max: 999999 }
        };

        function scrambleNumber(num) {
            const digits = num.toString().split('');
            for (let i = digits.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [digits[i], digits[j]] = [digits[j], digits[i]];
            }
            return digits.join('');
        }

        function newGame() {
            const range = difficultyRanges[difficulty];
            currentNumber = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
            currentScrambled = scrambleNumber(currentNumber);
            document.getElementById('scrambledNumber').textContent = currentScrambled;
            document.getElementById('answer').value = '';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            document.getElementById('answer').focus();
            attempts = 0;
            document.getElementById('attempts').textContent = '0';
        }

        function checkAnswer() {
            const answer = parseInt(document.getElementById('answer').value);
            const messageEl = document.getElementById('message');

            if (isNaN(answer)) {
                messageEl.textContent = 'Please enter a valid number!';
                messageEl.className = 'message error';
                return;
            }

            attempts++;
            document.getElementById('attempts').textContent = attempts;

            if (answer === currentNumber) {
                score += Math.max(10 - attempts, 1);
                document.getElementById('score').textContent = score;
                messageEl.textContent = `🎉 Correct! You earned ${Math.max(10 - attempts, 1)} points!`;
                messageEl.className = 'message success';
                setTimeout(() => newGame(), 2000);
            } else {
                messageEl.textContent = `❌ Wrong! Try again. (Attempt ${attempts})`;
                messageEl.className = 'message error';
            }
        }

        function giveHint() {
            const messageEl = document.getElementById('message');
            messageEl.textContent = `💡 Hint: The number is ${currentNumber.toString().length} digits`;
            messageEl.className = 'message';
        }

        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                difficulty = this.dataset.difficulty;
                newGame();
            });
        });

        // Enter key to submit
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Start the game
        newGame();
    </script>
</body>
</html>
